<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Agent Gateway</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 251, 245, 0.9);
      --ink: #1f1b16;
      --muted: #6a6157;
      --line: #d8c9b6;
      --accent: #0f766e;
      --accent-soft: #d6f3ef;
      --error: #b42318;
      --shadow: 0 18px 45px rgba(76, 54, 32, 0.12);
      --radius: 20px;
      --mono: "SFMono-Regular", "Menlo", "Monaco", monospace;
      --sans: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(180, 146, 72, 0.18), transparent 28%),
        linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
    }

    .shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(216, 201, 182, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 22px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .title {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    input, textarea, button {
      font: inherit;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.85);
      color: var(--ink);
      padding: 12px 14px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    textarea {
      min-height: 144px;
      resize: vertical;
      line-height: 1.5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: wait; transform: none; }

    .primary {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }

    .secondary {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 76vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 22px 22px 14px;
      border-bottom: 1px solid rgba(216, 201, 182, 0.8);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .log {
      padding: 22px;
      overflow: auto;
      display: grid;
      gap: 14px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.2)),
        repeating-linear-gradient(180deg, transparent, transparent 28px, rgba(216, 201, 182, 0.15) 29px);
    }

    .bubble {
      max-width: 86%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      animation: rise 0.22s ease;
    }

    .bubble.user {
      margin-left: auto;
      background: #1f1b16;
      color: #fdfaf6;
      border-bottom-right-radius: 6px;
    }

    .bubble.agent {
      background: #ffffff;
      border: 1px solid rgba(216, 201, 182, 0.95);
      border-bottom-left-radius: 6px;
    }

    .bubble.meta {
      max-width: 100%;
      background: rgba(15, 118, 110, 0.08);
      border: 1px dashed rgba(15, 118, 110, 0.3);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .chat-footer {
      padding: 16px 22px 22px;
      border-top: 1px solid rgba(216, 201, 182, 0.8);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .mono { font-family: var(--mono); }
    .error { color: var(--error); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .chat { min-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel controls">
      <div>
        <h1 class="title">Echo Gateway</h1>
        <p class="subtitle">A minimal frontend for the Gateway/WebSocket loop. Authenticate once, then send messages and watch live outbound events.</p>
      </div>

      <div class="row">
        <div class="field">
          <label for="platform">Platform</label>
          <input id="platform" value="web" />
        </div>
        <div class="field">
          <label for="userId">User ID</label>
          <input id="userId" value="demo-user" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="chatId">Chat ID</label>
          <input id="chatId" value="demo-chat" />
        </div>
        <div class="field">
          <label for="healthUrl">Health</label>
          <input id="healthUrl" value="/api/v1/health" />
        </div>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message">Hello. Please introduce yourself and confirm the current session key.</textarea>
      </div>

      <div class="actions">
        <button id="connectBtn" class="secondary">Connect WebSocket</button>
        <button id="sendBtn" class="primary">Send Message</button>
        <button id="healthBtn" class="secondary">Check Health</button>
      </div>
    </section>

    <section class="panel chat">
      <div class="chat-header">
        <div>
          <strong>Live Session</strong>
          <div id="status" class="status">Disconnected</div>
        </div>
        <div id="sessionKey" class="status mono">session: unknown</div>
      </div>
      <div id="log" class="log"></div>
      <div class="chat-footer">
        <div>Transport: <span id="transport" class="mono">idle</span></div>
        <div>Gateway path: <span class="mono" id="wsPath"></span></div>
      </div>
    </section>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const sessionKeyEl = document.getElementById("sessionKey");
    const logEl = document.getElementById("log");
    const transportEl = document.getElementById("transport");
    const wsPathEl = document.getElementById("wsPath");
    const connectBtn = document.getElementById("connectBtn");
    const sendBtn = document.getElementById("sendBtn");
    const healthBtn = document.getElementById("healthBtn");

    const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
    wsPathEl.textContent = wsUrl;

    let socket = null;

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function appendBubble(kind, text) {
      const node = document.createElement("div");
      node.className = `bubble ${kind}`;
      node.textContent = text;
      logEl.appendChild(node);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function appendMeta(obj) {
      appendBubble("meta", JSON.stringify(obj, null, 2));
    }

    function updateStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "status error" : "status";
    }

    async function connect() {
      if (socket && socket.readyState === WebSocket.OPEN) {
        return;
      }

      updateStatus("Connecting…");
      transportEl.textContent = "connecting";
      socket = new WebSocket(wsUrl);

      socket.onopen = () => {
        transportEl.textContent = "open";
        socket.send(JSON.stringify({
          type: "auth",
          platform: value("platform"),
          user_id: value("userId"),
          chat_id: value("chatId")
        }));
      };

      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "auth_ok") {
          sessionKeyEl.textContent = `session: ${data.session_key}`;
          updateStatus("Connected");
          appendMeta(data);
          return;
        }
        if (data.type === "message") {
          appendBubble("agent", data.text || "(empty)");
          return;
        }
        appendMeta(data);
      };

      socket.onerror = () => {
        updateStatus("WebSocket error", true);
      };

      socket.onclose = () => {
        transportEl.textContent = "closed";
        updateStatus("Disconnected");
      };
    }

    async function sendMessage() {
      const text = value("message");
      if (!text) {
        return;
      }
      appendBubble("user", text);

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: "message", text }));
        return;
      }

      const response = await fetch("/api/v1/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          platform: value("platform"),
          user_id: value("userId"),
          chat_id: value("chatId"),
          text,
          wait: true
        })
      });

      const data = await response.json();
      if (!response.ok) {
        appendBubble("meta", JSON.stringify(data, null, 2));
        updateStatus(`Request failed: ${response.status}`, true);
        return;
      }
      sessionKeyEl.textContent = `session: ${data.session_key || "unknown"}`;
      if (data.reply) {
        appendBubble("agent", data.reply.text || "(empty)");
      } else {
        appendMeta(data);
      }
    }

    async function checkHealth() {
      const response = await fetch(value("healthUrl"));
      const data = await response.json();
      appendMeta(data);
    }

    connectBtn.addEventListener("click", () => connect().catch((error) => {
      appendBubble("meta", String(error));
      updateStatus("Connect failed", true);
    }));

    sendBtn.addEventListener("click", () => sendMessage().catch((error) => {
      appendBubble("meta", String(error));
      updateStatus("Send failed", true);
    }));

    healthBtn.addEventListener("click", () => checkHealth().catch((error) => {
      appendBubble("meta", String(error));
    }));
  </script>
</body>
</html>
